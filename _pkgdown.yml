url: https://github.com/wilsonjewel27/JW26ADS8192
template:
  bootstrap: 5
  bootswatch: flatly
  light-switch: true
navbar:
  structure:
    left:
    - intro
    - reference
    - articles
    right:
    - search
    - github
  components:
    articles:
      text: Functions
      menu:
      - text: 'Step 1: Determining Filter Threshold'
        href: articles/determining-filter-threshold.html
      - text: 'Step 2: Filtering Low Expression Genes'
        href: articles/filter-low-expression-genes.html
      - text: 'Step 3: Run DESeq2 Analysis'
        href: articles/run-DESeq2-analysis.html
      - text: 'Step 4: Shrink DGE Results'
        href: articles/shrink-dge-results.html
      - text: 'Step 5: Summarize Gene Regulation'
        href: articles/summarize-gene-regulation.html
      - text: 'Step 6: Visualize Results: Volcano Plot'
        href: articles/volcano-plot.html
      - text: 'Step 7: Export Final Results'
        href: articles/export-results.html

reference:
- title: Example Data
  desc: Load an example simulated SummarizedExperiment object
  contents:
  - example_se
- title: Determining the Minimal Gene Threshold
  desc: Use to determine which gene should not be included in analysis.
  contents:
  - determine_filter_threshold()
- title: Filter Low Expression Genes
  desc: Pick a threshold to filter genes with low expression counts
  contents:
  - filter_low_exp_genes()
- title: Run DESeq2 Analysis
  desc: Run differential gene expression analysis
  contents:
  - run_DESeq2()
- title: Shrink Results
  desc: To get more reilable estimates run the log2_shrinkage function on DESeq2 results
  contents: log2_shrinkage()
- title: Interpret Gene Regulation
  desc: Tabularly visualize the number for up and down regulated and insignificant genes
  contents: gene_regulation_summary()
- title: Visualize Expression
  desc: Visualize the gene expression in a volcano plot
  contents: generate_volcano()
- title: Export Results
  desc: Export the results of generate_volcano(), determine_filter_threshold(), log2_shrinkage(), and gene_regulation_summary() into your working directory.
  contents: export_outputs()
articles:
- title: Function Descriptions
  navbar: ~
  contents:
  - "`articles/determining-filter-threshold.html`"
  - "`articles/filter-low-expression-genes.html`"
  - "`articles/run-DESeq2-analysis.html`"
  - "`articles/shrink-dge-results.html`"
  - "`articles/summarize-gene-regulation.html`"
  - "`articles/volcano-plot.html`"
  - "`articles/export-results.html`"
